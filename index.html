<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Samui Hotel Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0fdf4; /* สีขาวอมเขียวอ่อน */
            background-image: radial-gradient(#bbf7d0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .bounce-hover:hover {
            transform: translateY(-2px);
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#f0fdf4', 100: '#dcfce7' },
                        brown: { 
                            200: '#86efac', 300: '#4ade80', 400: '#22c55e', 500: '#166534', 600: '#14532d' 
                        },
                        pink: { 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#16a34a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 text-brown-500 relative overflow-x-hidden bg-cream-50">

    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-md transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border border-green-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        คัดลอกสำเร็จ
    </div>

    <div class="relative z-10 mb-8 flex items-center justify-center gap-2 mt-4 text-green-700">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 text-green-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 9.563C9 9.252 9.252 9 9.563 9h4.874c.311 0 .563.252.563.563v4.874c0 .311-.252.563-.563.563H9.564A.562.562 0 019 14.437V9.564z" />
        </svg>
        <h1 class="text-2xl md:text-3, font-bold tracking-wide">Sri Samui Hotel</h1>
    </div>

    <div class="max-w-md w-full relative z-10">
        <div class="bg-white p-2 rounded-[24px] border border-green-200 shadow-sm relative z-10 mb-6">
            <div class="absolute -top-4 -left-4 z-20">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-12 h-12 transform -rotate-12 drop-shadow-sm">
                    <circle cx="50" cy="50" r="45" fill="#bbf7d0" stroke="#4ade80" stroke-width="4"/>
                    <circle cx="50" cy="50" r="32" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="6 6"/>
                </svg>
            </div>
            <img src="image.png" alt="Sri Samui Hotel" class="w-full h-auto object-cover rounded-[16px]" onerror="this.src='https://placehold.co/600x600/dcfce7/166534?text=Sri+Samui+Hotel'">
        </div>

        <div class="bg-white px-6 pb-8 pt-8 rounded-[24px] border border-green-200 shadow-sm relative z-10">
            <div class="space-y-6 relative z-10">
                <div class="text-center space-y-4">
                    <p class="text-[15px] leading-relaxed font-medium text-brown-500">
                        ร้านจูรับทำเว็บครบวงจรนะแม่น้า⭐️ <br>
                        ชื่อบัญชี <span class="font-bold text-green-600">อนุสรา</span> เท่านั้นน้า!!
                    </p>
                    
                    <div class="bg-green-50 text-brown-500 rounded-xl p-3 text-[13px] text-left border border-green-100 shadow-sm">
                        <p><strong>🎨 งานที่รับทำ:</strong> เว็บแอพพรีเมียม, เว็บรับเติมเกมส์, เว็บรับทำป้าย</p>
                        <p class="mt-2"><strong>📋 เงื่อนไข:</strong> รอ 4-8 ชม. / งานเร่ง *2</p>
                    </div>
                </div>

                <div class="space-y-4 pt-2 border-t border-dashed border-green-200">
                    <div class="flex items-center justify-center gap-1 text-[13px] text-brown-400 mt-4 mb-2 font-medium">
                        จิ้มปุ่มเพื่อคัดลอกเลขบัญชีได้เลยค้าบ
                    </div>

                    <div class="bg-white rounded-[16px] p-3 flex items-center justify-between border border-green-100 shadow-sm hover:border-green-300">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center text-green-600 font-bold text-lg border border-green-100">K+</div>
                            <div>
                                <div class="text-[11px] text-brown-400 font-medium">กสิกรไทย (อนุสรา)</div>
                                <div class="font-bold tracking-wider text-green-600 text-base">2221396513</div>
                            </div>
                        </div>
                        <button onclick="copyText('2221396513', this)" class="bounce-hover bg-green-50 hover:bg-green-100 text-green-600 text-[12px] font-semibold px-4 py-2 rounded-full border border-green-200">คัดลอก</button>
                    </div>

                    <div class="bg-white rounded-[16px] p-3 flex items-center justify-between border border-orange-100 shadow-sm hover:border-orange-300">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center text-orange-500 font-bold text-lg border border-orange-100">W</div>
                            <div>
                                <div class="text-[11px] text-brown-400 font-medium">วอเลท (อนุสรา)</div>
                                <div class="font-bold tracking-wider text-orange-500 text-base">0943947154</div>
                            </div>
                        </div>
                        <button onclick="copyText('0943947154', this)" class="bounce-hover bg-orange-50 hover:bg-orange-100 text-orange-600 text-[12px] font-semibold px-4 py-2 rounded-full border border-orange-200">คัดลอก</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, buttonElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('opacity-0', '-translate-y-4'); }, 2000);
        }
    </script>
</body>
</html>
